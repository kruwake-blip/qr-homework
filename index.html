<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบ QR Homework - ตรวจสอบเวอร์ชัน V5</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; padding-top: 50px; }
    .debug-card { background-color: #1e293b; border: 2px solid #3b82f6; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 16px; padding: 30px; }
    .btn-test { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-weight: bold; border: none; font-size: 1.2rem; padding: 15px; }
    .btn-test:hover { background: linear-gradient(135deg, #d97706, #b45309); color: white; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        
        <h2 class="text-warning mb-4 fw-bold"><i class="fa-solid fa-triangle-exclamation"></i> ตรวจพบการอัปเดตระบบ V5</h2>
        
        <div class="debug-card text-start">
          <p class="text-center text-info fw-bold mb-4" style="font-size: 1.1rem;">
            ถ้าน่าจอนี้เปลี่ยนเป็นสีเข้ม (สีน้ำเงินดำ) แสดงว่าโค้ดอัปเดตสำเร็จแล้วครับ!
          </p>
          
          <div class="mb-4">
            <label class="form-label fw-bold text-white">1. ตรวจสอบลิงก์ Google Apps Script ของคุณครู:</label>
            <input type="text" id="urlDisplay" class="form-control bg-dark text-success border-secondary" readonly>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold text-white">2. ทดสอบการเชื่อมต่อเชิงลึก:</label>
            <button type="button" onclick="executeDebugConnection()" class="btn btn-test w-100 rounded-pill shadow">
              <i class="fa-solid fa-plug"></i> คลิกตรงนี้เพื่อทดสอบเชื่อมต่อ (Debug Connect)
            </button>
          </div>

          <div class="p-3 bg-dark rounded border border-secondary" style="min-height: 100px;">
            <span class="text-secondary d-block mb-1 fw-bold">ผลการตรวจสอบระบบ:</span>
            <div id="debugResultText" class="text-warning fw-bold">⚠️ รอกดปุ่มทดสอบด้านบน...</div>
          </div>
          
          <div class="mt-4 text-center">
            <button type="button" onclick="showOldLogin()" class="btn btn-outline-light btn-sm">แสดงฟอร์มเข้าสู่ระบบดั้งเดิม</button>
          </div>
        </div>

        <div id="oldLoginSection" class="debug-card mt-4 text-start hidden">
          <h4 class="text-primary fw-bold text-center mb-3">เข้าสู่ระบบระบบสแกน</h4>
          <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username">
          </div>
          <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password">
          </div>
          <button type="button" onclick="alert('กรุณากดปุ่มทดสอบด้านบนให้ผ่านก่อนครับ')" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    // 🚨 คุณครูสลับลิงก์ตรงนี้ให้เป็นลิงก์ Web App ของคุณครูนะครับ
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzuXvt7_gU_PS34AvWmNZ9XSKIx68Gk76yUC7WvMU_8esPHL53hXOHgLxnXcCdY5Oa-/exec";

    // แสดงลิงก์ในหน้าเว็บให้เห็นชัดๆ
    document.getElementById('urlDisplay').value = BACKEND_URL;

    async function executeDebugConnection() {
      const resultDiv = document.getElementById('debugResultText');
      resultDiv.innerText = "⏳ กำลังส่งข้อมูลทดสอบ ยอดหลังบ้านกำลังทำงาน...";
      resultDiv.className = "text-info fw-bold";

      try {
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "getAssignments" })
        });
        
        if (!response.ok) {
          throw new Error("เซิร์ฟเวอร์ตอบกลับด้วยรหัสผิดพลาด HTTP: " + response.status);
        }
        
        const resData = await response.json();
        
        if (Array.isArray(resData)) {
          resultDiv.innerText = "🎉 เชื่อมต่อสำเร็จ 100%! ดึงข้อมูลงานได้ " + resData.length + " ชิ้นงาน โค้ด HTML คุยกับ Google Sheets ได้สมบูรณ์แล้วครับ";
          resultDiv.className = "text-success fw-bold";
          document.getElementById('oldLoginSection').classList.remove('hidden');
        } else {
          resultDiv.innerText = "⚠️ เชื่อมต่อได้ แต่ข้อมูลปลายทางผิดรูปแบบ: " + JSON.stringify(resData);
          resultDiv.className = "text-warning fw-bold";
        }
      } catch (err) {
        resultDiv.className = "text-danger fw-bold";
        resultDiv.innerHTML = "🚨 การเชื่อมต่อล้มเหลว (Failed to Connect)<br><br>" +
                              "<b>สาเหตุที่เป็นไปได้:</b><br>" +
                              "1. ลิงก์ BACKEND_URL ผิดตัว หรือก๊อบปี้มาไม่ครบ<br>" +
                              "2. ที่ฝั่ง Google Apps Script ตอนกด Deploy ไม่ได้เลือก Who has access เป็น <b>'Anyone' (ทุกคน)</b> ทำให้ติดสิทธิ์ความปลอดภัย (CORS Block)<br><br>" +
                              "<b>ข้อความ Error:</b> " + err.message;
      }
    }

    function showOldLogin() {
      document.getElementById('oldLoginSection').classList.toggle('hidden');
    }
  </script>
</body>
</html>
